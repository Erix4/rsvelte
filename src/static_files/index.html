<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>svelters-output</title>
    <style>
    </style>
    <script type="module">
        import init, { first_patch } from './pkg/svelters_output.js';
        import { buildNodeMap, setupEventListeners } from './startup.js';
        import { applyPatches } from './patches.js';

        async function run_init() {
            await init();
            let patches = await first_patch();
            applyPatches(patches, nodeMap);
        }
        run_init();

        // Initial render
        const nodeMap = buildNodeMap();
        document.body.appendChild(nodeMap[0]);
        setupEventListeners(nodeMap);

        // Hot reload WebSocket
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        ws.onmessage = () => {
            console.log('Reloading page...');
            window.location.reload();
        };
        ws.onclose = () => {
            console.log('WebSocket closed, attempting to reconnect...');
            setTimeout(() => window.location.reload(), 1000);
        };
        ws.onopen = () => {
            console.log('Hot reload connected');
        };
    </script>
</head>

<body>
</body>

</html>
